<div class="forgot-page">
  <div class="forgot-container">

    <!-- Cat Lying on top of the frame -->
    <div class="cat-wrapper">
      <img src="images/login/cat-lying.png" alt="Gato tumbado" class="cat-lying">
    </div>

    <!-- Decorative frame -->
    <div class="frame-wrapper">
      <img src="images/login/register-frame.png" alt="Marco" class="forgot-frame">

      <!-- Form content inside the frame -->
      <div class="form-card">
        
        <p class="description-text">
          Introduce la dirección de email<br>vinculada a tu cuenta de Impaintor.
        </p>

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">

          <!-- Email Input -->
          <div class="form-group">
            <label for="email" class="form-label">EMAIL</label>
            <input type="email" id="email" formControlName="email" placeholder="tu@email.com" class="form-input">
            <span class="error-message"
              *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('required')">
              El email es requerido
            </span>
            <span class="error-message"
              *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.hasError('email')">
              Email inválido
            </span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-submit" [disabled]="!forgotForm.valid || isLoading">
            {{ isLoading ? 'Enviando...' : 'Restablecer contraseña' }}
          </button>

          <!-- Success Message -->
          <div class="success-alert" *ngIf="successMessage">
            <p>{{ successMessage }}</p>
          </div>

          <!-- Back to Login -->
          <div class="links-section">
            <button type="button" (click)="goToLogin()" class="btn-text-link">
              Volver a Iniciar sesión
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

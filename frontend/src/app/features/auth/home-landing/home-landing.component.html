<div class="landing-container">
  <!-- Background decorative paint splashes -->
  <div class="background-decoration"></div>

  <div class="landing-content">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="cat-circle-wrapper" aria-hidden="true">
        <img class="circle-frame" src="/images/landing/circulo.png" alt="">
        <img src="/images/landing/impaintor-cat-bike.png" alt="Gato en bicicleta" class="logo">
      </div>
      <img src="/images/landing/impaintor-title.png" alt="Impaintor" class="title-img">
    </div>

    <!-- Main Buttons -->
    <div class="buttons-container">

      <!-- Login -->
      <button class="btn btn-login" (click)="goToLogin()" id="btn-iniciar-sesion">
        <span class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="width: 1.2rem; height: 1.2rem; vertical-align: middle; display: inline-block;">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </span>
        <span class="btn-text">Iniciar sesión</span>
      </button>
 
      <!-- Forgot password -->
      <p class="forgot-password-link">
        <a href="javascript:void(0)" (click)="goToForgotPassword()">¿Olvidaste tu contraseña?</a>
      </p>
 
      <!-- Register -->
      <button class="btn btn-register" (click)="goToRegister()" id="btn-registrarse">
        <span class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="width: 1.2rem; height: 1.2rem; vertical-align: middle; display: inline-block;">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </span>
        <span class="btn-plus">+</span>
        <span class="btn-text">Registrarse</span>
      </button>
 
      <!-- Tagline as Guest replacement -->
      <div class="tagline">
        <p>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 1.25rem; height: 1.25rem; vertical-align: -0.2em; margin-right: 0.4rem; display: inline-block; color: #c9a86c;">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12c0 2.75 2.25 5 5 5h1a2 2 0 0 1 2 2c0 1.66-1.34 3-3 3-1.66 0-3-1.34-3-3"></path>
            <circle cx="7.5" cy="10.5" r=".5" fill="currentColor"></circle>
            <circle cx="11.5" cy="7.5" r=".5" fill="currentColor"></circle>
            <circle cx="16.5" cy="9.5" r=".5" fill="currentColor"></circle>
            <circle cx="15.5" cy="14.5" r=".5" fill="currentColor"></circle>
          </svg>
          Dibuja, engaña y diviértete con tus amigos
        </p>
      </div>

    </div>
  </div>
</div>

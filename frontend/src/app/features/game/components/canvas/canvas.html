<div class="canvas-container">
  <!-- Herramientas de dibujo -->
  <div class="toolbar" *ngIf="isActive">
    <!-- Colores -->
    <div class="tool-section">
      <label>Colores</label>
      <div class="color-palette">
        <div *ngFor="let color of colors" 
             class="color-swatch"
             [style.background-color]="color"
             [class.selected]="brushConfig.color === color"
             [class.white-border]="color === '#FFFFFF'"
             (click)="selectColor(color)">
        </div>
      </div>
    </div>

    <!-- Grosor -->
    <div class="tool-section">
      <label>Pincel</label>
      <div class="thickness-selector">
        <div *ngFor="let t of thicknesses"
             class="thickness-btn"
             [class.selected]="brushConfig.thickness === t"
             (click)="selectThickness(t)">
          <div class="thickness-preview" 
               [style.width.px]="t * 2" 
               [style.height.px]="t * 2">
          </div>
        </div>
      </div>
    </div>

    <!-- Herramientas adicionales -->
    <div class="tool-section">
      <div class="tools">
        <button class="tool-btn" 
                [class.selected]="brushConfig.tool === 'pen'"
                (click)="usePen()"
                title="Lápiz">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="width: 1.2rem; height: 1.2rem; display: inline-block; vertical-align: middle;">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
          </svg>
        </button>
        <button class="tool-btn" 
                [class.selected]="brushConfig.tool === 'eraser'"
                (click)="useEraser()"
                title="Borrador">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="width: 1.2rem; height: 1.2rem; display: inline-block; vertical-align: middle;">
            <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path>
            <path d="M22 21H7"></path>
            <path d="m5 11 9 9"></path>
          </svg>
        </button>
        <button class="tool-btn clear-btn" 
                (click)="clearCanvas()"
                title="Limpiar lienzo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="width: 1.2rem; height: 1.2rem; display: inline-block; vertical-align: middle;">
            <path d="M3 6h18"></path>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
            <line x1="10" x2="10" y1="11" y2="17"></line>
            <line x1="14" x2="14" y1="11" y2="17"></line>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrapper">
    <canvas 
      #canvas
      ngSkipHydration
      [class.active]="isActive"
      [class.inactive]="!isActive"
      style="touch-action: none; position: relative; z-index: 1000;"
      (mousedown)="onMouseDown($event)"
      (mousemove)="onMouseMove($event)"
      (mouseup)="onMouseUp()"
      (touchstart)="onTouchStart($event)"
      (touchmove)="onTouchMove($event)"
      (touchend)="onMouseUp()"
      (touchcancel)="onMouseUp()">
    </canvas>
  </div>
</div>

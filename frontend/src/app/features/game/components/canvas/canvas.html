<div class="canvas-container">
  <!-- Herramientas de dibujo -->
  <div class="toolbar" *ngIf="isActive">
    <!-- Colores -->
    <div class="tool-section">
      <label>Colores</label>
      <div class="color-palette">
        <div *ngFor="let color of colors" 
             class="color-swatch"
             [style.background-color]="color"
             [class.selected]="brushConfig.color === color"
             [class.white-border]="color === '#FFFFFF'"
             (click)="selectColor(color)">
        </div>
      </div>
    </div>

    <!-- Grosor -->
    <div class="tool-section">
      <label>Pincel</label>
      <div class="thickness-selector">
        <div *ngFor="let t of thicknesses"
             class="thickness-btn"
             [class.selected]="brushConfig.thickness === t"
             (click)="selectThickness(t)">
          <div class="thickness-preview" 
               [style.width.px]="t * 2" 
               [style.height.px]="t * 2">
          </div>
        </div>
      </div>
    </div>

    <!-- Herramientas adicionales -->
    <div class="tool-section">
      <div class="tools">
        <button class="tool-btn" 
                [class.selected]="brushConfig.tool === 'pen'"
                (click)="usePen()"
                title="Lápiz">
          ✏️
        </button>
        <button class="tool-btn" 
                [class.selected]="brushConfig.tool === 'eraser'"
                (click)="useEraser()"
                title="Borrador">
          🧽
        </button>
        <button class="tool-btn clear-btn" 
                (click)="clearCanvas()"
                title="Limpiar lienzo">
          🗑️
        </button>
      </div>
    </div>

    <!-- Info palabra (opcional) -->
    <div class="tool-section word-display" *ngIf="showWord">
      <label>Palabra:</label>
      <span class="word-badge">{{showWord}}</span>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrapper">
    <canvas 
      #canvas
      ngSkipHydration
      [class.active]="isActive"
      [class.inactive]="!isActive"
      style="touch-action: none; position: relative; z-index: 1000;"
      (mousedown)="onMouseDown($event)"
      (mousemove)="onMouseMove($event)"
      (mouseup)="onMouseUp()"
      (mouseleave)="onMouseUp()"
      (touchstart)="onTouchStart($event)"
      (touchmove)="onTouchMove($event)"
      (touchend)="onMouseUp()"
      (touchcancel)="onMouseUp()">
    </canvas>
  </div>
</div>
